# Publishes the immutable EC618 base artifact set against which slots link.
# The release is named from toolchains/ec618/base-version (ec618-base-vN);
# bump that version file whenever the base changes.
#
# Each release carries the universal base. The console UART is selected by
# the anchor record, so the same base runs every rig. The base is proven by
# building a full slot against it (all build guards) before publication.

name: EC618 base release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: self-linux

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build SDK
        run: make

      - name: Check the release does not exist yet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat toolchains/ec618/base-version | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          if gh release view "ec618-base-v$VERSION" > /dev/null 2>&1; then
            echo "Release ec618-base-v$VERSION already exists — bump toolchains/ec618/base-version."
            exit 1
          fi

      - name: Build + prove universal base
        run: |
          make ec618-base
          make ec618
          mkdir -p build/release-ec618-base
          cp build/ec618-base/base.elf build/release-ec618-base/ec618-base-v$VERSION.elf
          cp build/ec618-base/base.bin build/release-ec618-base/ec618-base-v$VERSION.bin
          cp build/ec618-base/base-manifest.json build/release-ec618-base/ec618-base-v$VERSION.json

      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "ec618-base-v$VERSION" \
            --title "EC618 base v$VERSION" \
            --notes "EC618 base artifact set used to link and flash compatible slots.

          This is the universal base; the anchor record selects the console
          UART. Slots link against base.elf; base.bin carries the stamped
          base-id record the device checks before accepting a slot OTA. To
          build a slot against this release: download the files into a
          directory as base.elf/base.bin and run
          \`make ec618 EC618_BASE_DIR=<dir>\`." \
            build/release-ec618-base/*
