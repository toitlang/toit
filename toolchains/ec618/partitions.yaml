# EC618 flash partition descriptor — the default layout consumed by the
# host tools. Offsets are raw flash
# addresses (erase/write view); the XIP view adds xip-offset.
#
# The device itself never sees this file: provisioning bakes it into the
# anchor record (boot state + table, directly after the base image), and
# both the dispatcher and the VM read THAT at runtime. The base's linker
# template carries the matching frozen literals; gen-base-id.toit refuses
# to stamp a base whose symbols disagree with this descriptor.
#
# `offset` is OPTIONAL: an entry without one starts where the previous
# entry ends. That keeps the anchor chain soft — base-id sits directly
# after the base, the slots after base-id — so a future base-vN size
# change is a one-line `size:` edit that reflows everything after it.
# An explicit `offset` marks an EXTERNAL constraint (boot ROM, SDK,
# live on-flash data) and doubles as an assertion: the chain must land
# exactly there, or generation fails. The table must cover
# 0x000000..0x400000 contiguously (tools/ec618/partitions.toit enforces
# coverage, ordering and 4 KiB alignment).
#
# Types:
#   locked   - vendor/boot territory; never managed or moved by Toit.
#   base     - the frozen AP/PLAT base image (max extent; frozen ABI edge).
#   base-id  - the base version+fingerprint page the OTA gate checks.
#   anchor   - the anchor record (boot state + the active table).
#   slot     - a VM slot (relocate-on-write target).
#   data     - Toit-managed data (flash registry today).
#   free     - available; becomes user-assignable via table edits.

xip-offset: 0x800000

partitions:
  - name: headers          # Boot ROM flash headers (BLS/SYS).
    type: locked
    offset: 0x000000
    size: 0x4000
  - name: bootloader
    type: locked
    size: 0x20000
  - name: base             # PLAT + dispatcher; SDK bootloader jumps here.
    type: base
    offset: 0x024000       # Boot-ROM-fixed AP load address (XIP 0x824000).
    size: 0x16C000
  - name: base-id          # 'TBI1' version + fingerprint, directly after
    type: base-id          # the base — derived, never pinned.
    size: 0x1000
  - name: littlefs         # SDK littlefs: the OSA config store (OsaGet/Set-
    type: locked           # FlashValue). Frozen with the base; 32 x 4 KiB.
    size: 0x20000
  - name: anchor           # The anchor record follows all frozen regions, so
    type: anchor           # it is the fixed boundary between base and table-
    size: 0x2000           # described mutable state. Two ping-ponged sectors.
  - name: ota-a
    type: slot
    size: 0xC0000
  - name: ota-b
    type: slot
    size: 0xC0000
  - name: free             # One sector retained for layout-shift testing and
    type: free
    size: 0x1000           # custom descriptors can spend without moving data.
  - name: registry         # Toit flash registry (storage buckets). The old
    type: data             # 64 KiB registry is its upper subset, preserving
    size: 0xA8000          # existing raw allocations while growing downward.
  - name: nvram-factory    # Modem RF calibration — losing it bricks the modem.
    type: locked
    offset: 0x3DC000       # Vendor-fixed from here to the end of flash.
    size: 0x4000
  - name: nvram
    type: locked
    size: 0x4000
  - name: hib-backup       # Deep-sleep/PSM memory backup.
    type: locked
    size: 0x18000
  - name: plat-config
    type: locked
    size: 0x1000
  - name: reset-info
    type: locked
    size: 0x1000
  - name: excep-info       # SDK crash dump key info.
    type: locked
    size: 0x1000
  - name: reserved-tail
    type: locked
    size: 0x1000
