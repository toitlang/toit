# EC618 flash partition descriptor — the single source of truth for the
# flash layout (docs/partition-table-design.md §0). Offsets are RAW flash
# addresses (erase/write view); the XIP view adds xip-offset.
#
# Regenerate the derived header after every change:
#
#   build/host/sdk/bin/toit tools/ec618/gen-partitions.toit \
#       --out toolchains/ec618/project/inc/toit_partitions.h \
#       toolchains/ec618/partitions.yaml
#
# `offset` is OPTIONAL: an entry without one starts where the previous
# entry ends. That keeps the anchor chain soft — base-id sits directly
# after the base, the slots after base-id — so a future base-vN size
# change is a one-line `size:` edit that reflows everything after it.
# An explicit `offset` marks an EXTERNAL constraint (boot ROM, SDK,
# live on-flash data) and doubles as an assertion: the chain must land
# exactly there, or generation fails. The table must cover
# 0x000000..0x400000 contiguously (tools/ec618/partitions.toit enforces
# coverage, ordering and 4 KiB alignment).
#
# Types:
#   locked   - vendor/boot territory; never managed or moved by Toit.
#   base     - the frozen AP/PLAT base image (max extent; frozen ABI edge).
#   base-id  - the base version+fingerprint page the OTA gate checks.
#   marker   - the A/B power-fail-safe record (OTA state; table, from v2).
#   slot     - a VM slot (relocate-on-write target).
#   data     - Toit-managed data (flash registry today).
#   free     - available; becomes user-assignable with the marker-v2 work.

xip-offset: 0x800000

partitions:
  - name: headers          # Boot ROM flash headers (BLS/SYS).
    type: locked
    offset: 0x000000
    size: 0x4000
  - name: bootloader
    type: locked
    size: 0x20000
  - name: base             # PLAT + dispatcher; SDK bootloader jumps here.
    type: base
    offset: 0x024000       # Boot-ROM-fixed AP load address (XIP 0x824000).
    size: 0x16C000
  - name: base-id          # 'TBI1' version + fingerprint; the frozen anchor
    type: base-id          # directly after the base — derived, never pinned.
    size: 0x1000
  - name: ota-a
    type: slot
    size: 0xC0000
  - name: ota-b
    type: slot
    size: 0xC0000
  - name: marker           # Moves directly after base-id at base-v2.
    type: marker
    size: 0x2000
  - name: free             # Reclaimed FOTA band.
    type: free
    size: 0x71000
  - name: littlefs         # SDK littlefs region; unused by Toit. Reclaim at base-v2.
    type: locked
    offset: 0x384000       # SDK mem_map.h fixed address.
    size: 0x48000
  - name: registry         # Toit flash registry (storage buckets). LIVE data —
    type: data             # the explicit offset guards against silent moves.
    offset: 0x3CC000
    size: 0x10000
  - name: nvram-factory    # Modem RF calibration — losing it bricks the modem.
    type: locked
    offset: 0x3DC000       # Vendor-fixed from here to the end of flash.
    size: 0x4000
  - name: nvram
    type: locked
    size: 0x4000
  - name: hib-backup       # Deep-sleep/PSM memory backup.
    type: locked
    size: 0x18000
  - name: plat-config
    type: locked
    size: 0x1000
  - name: reset-info
    type: locked
    size: 0x1000
  - name: excep-info       # SDK crash dump key info.
    type: locked
    size: 0x1000
  - name: reserved-tail
    type: locked
    size: 0x1000
